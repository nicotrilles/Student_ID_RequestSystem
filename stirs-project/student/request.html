<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aces Polytechnic - Track ID Request</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="request.css">
</head>
<body>

<div class="track-container">
    <div class="track-box">
        <div class="header">
            <img src="../photo/acespicture-modified (1).png" class="logo" alt="Logo">
            <h1>Track Your ID Request</h1>
            <p>Enter your Tracking Number and Student ID to check status</p>
        </div>

        <form id="trackForm">
            <div class="input-group">
                <label>Tracking Number <span class="required">*</span></label>
                <input type="text" id="trackingNumber" placeholder="e.g. REQ-20260329-00123" required>
            </div>

            <div class="input-group">
                <label>Student ID Number <span class="required">*</span></label>
                <input type="text" id="studentId" placeholder="e.g. 140123" required>
            </div>

            <!-- href="checkStatus.html" -->
            <button type="submit" class="track-btn">
                <i class="fas fa-search"></i> Check Status
            </button>

            <a href="../../index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </form>

        <!-- Result Area (Hidden initially) -->
        <div id="result" class="result-area" style="display: none;">
            <h3>Request Status</h3>
            <div class="status-card">
                <div id="statusIcon" class="status-icon"></div>
                <div class="status-details">
                    <p><strong>Tracking Number:</strong> <span id="displayTracking"></span></p>
                    <p><strong>Student ID:</strong> <span id="displayStudentId"></span></p>
                    <p><strong>Status:</strong> <span id="statusText" class="status-text"></span></p>
                    <p><strong>Date Submitted:</strong> <span id="submitDate"></span></p>
                    <p id="adminComment"></p>
                </div>
            </div>
            <button onclick="window.location.reload()" class="new-search-btn">
                Check Another Request
            </button>
        </div>

        <div class="footer-link">
            <!-- <p>Have an account? <a href="loginform.html">Back to Login</a></p> -->
            <p>Don't have a tracking number? <a href="requestForm.html">Submit a request</a></p>
        </div>

    </div>
</div>

<script>
    
    document.getElementById('idRequestForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. GRAB ALL VALUES (This was the missing part!)
        const formData = {
            fullName: document.getElementById('fullName').value.trim(),
            studentId: document.getElementById('studentId').value.trim(),
            course: document.getElementById('course').value,
            requestType: document.getElementById('requestType').value,
            reason: document.getElementById('reason').value.trim(),
            submittedAt: new Date().toLocaleDateString(),
            status: 'Pending'
        };

        // 2. Validation for Student ID
        const idPattern = /^140\d{3}$/;
        if (!idPattern.test(formData.studentId)) {
            document.getElementById('studentIdHint').style.display = 'block';
            return;
        }

        // 3. Generate Tracking Number
        const year = new Date().getFullYear();
        const randomNum = Math.floor(10000 + Math.random() * 90000);
        formData.trackingNumber = `REQ-${year}-${randomNum}`;

        // 4. SAVE THE ENTIRE OBJECT
        localStorage.setItem('lastIdRequest', JSON.stringify(formData));

        // 5. Update UI
        document.getElementById('trackingNumberDisplay').textContent = formData.trackingNumber;
        document.getElementById('requestFormSection').style.display = 'none';
        document.getElementById('successSection').style.display = 'block';
    });


    // Real-time ID validation feedback
    document.getElementById('studentId').addEventListener('input', function() {
        const studentIdHint = document.getElementById('studentIdHint');
        const idPattern = /^140\d{3}$/;
        if (idPattern.test(this.value.trim())) {
            studentIdHint.style.display = 'none';
            this.style.borderColor = '#2E7D32';
        } else {
            this.style.borderColor = '#ccc';
        }
    });
</script>

</body>
</html>
