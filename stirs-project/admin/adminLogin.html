<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIRS – Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --green: #1B5E20; --mid: #2E7D32; --lt: #E8F5E9; --gold: #C9A84C; }
        body { font-family: 'DM Sans', sans-serif; background: #eef2f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .shell {
            display: flex; width: min(1060px, 97vw); height: min(640px, 94vh);
            border-radius: 22px; overflow: hidden;
            box-shadow: 0 28px 70px rgba(0,0,0,0.2);
        }

        /* LEFT */
        .left {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=900&q=80') center/cover no-repeat;
            position: relative;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 48px;
        }
        .left::before { content: ''; position: absolute; inset: 0; background: linear-gradient(155deg, rgba(27,94,32,0.6) 0%, rgba(0,0,0,0.78) 100%); }
        .left-content { position: relative; z-index: 1; color: white; }
        .badge-gold {
            display: inline-block; background: var(--gold); color: white;
            font-size: 10px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
        }
        .left h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 3.5vw, 44px); line-height: 1.15; margin-bottom: 12px; }
        .left p { font-size: 14px; opacity: 0.8; max-width: 280px; line-height: 1.6; margin-bottom: 26px; }
        .socials { display: flex; gap: 16px; }
        .socials a { color: rgba(255,255,255,0.55); font-size: 17px; transition: color 0.2s; }
        .socials a:hover { color: white; }

        /* RIGHT */
        .right {
            width: 420px; flex-shrink: 0;
            background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 48px 42px;
        }
        .admin-badge {
            display: flex; align-items: center; gap: 8px;
            background: var(--lt); border: 1px solid #a5d6a7;
            padding: 6px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 700; color: var(--green);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .right h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--green); margin-bottom: 5px; }
        .right .sub { font-size: 13.5px; color: #888; margin-bottom: 32px; }

        .fg { width: 100%; margin-bottom: 18px; }
        .fg input {
            width: 100%; padding: 13px 16px;
            border: 1.5px solid #dde3ec; border-radius: 12px;
            font-size: 15px; font-family: 'DM Sans', sans-serif; color: #333;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .fg input:focus { outline: none; border-color: var(--mid); box-shadow: 0 0 0 3px rgba(46,125,50,0.12); }
        .pw-wrap { position: relative; }
        .pw-wrap i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #aaa; cursor: pointer; font-size: 16px; }

        .err-msg { display: none; font-size: 13px; color: #c0392b; background: #fff5f5; border-left: 3px solid #c0392b; padding: 9px 12px; border-radius: 8px; margin-bottom: 14px; }
        .err-msg.show { display: block; }

        .login-btn {
            width: 100%; padding: 14px;
            background: var(--mid); color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
            box-shadow: 0 6px 20px rgba(46,125,50,0.28); margin-bottom: 16px;
        }
        .login-btn:hover { background: var(--green); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(46,125,50,0.38); }
        .login-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        .back-link { display: flex; align-items: center; gap: 7px; color: var(--mid); text-decoration: none; font-size: 14px; font-weight: 600; justify-content: center; }
        .back-link:hover { text-decoration: underline; }

        .demo-note { margin-top: 20px; padding: 10px 14px; background: #f0f9f0; border: 1px solid #c8e6c9; border-radius: 10px; font-size: 12px; color: #388e3c; text-align: center; }

        .spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 700px) {
            .shell { flex-direction: column; height: auto; width: 100vw; border-radius: 0; }
            .left { height: 220px; padding: 30px; flex-shrink: 0; }
            .right { width: 100%; padding: 36px 24px; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="left">
        <div class="left-content">
            <span class="badge-gold">Admin Access</span>
            <h1>ACES STIRS<br>Admin Portal</h1>
            <p>Manage and oversee all student ID requests from one secure dashboard.</p>
            <!-- <div class="socials">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div> -->
        </div>
    </div>

    <div class="right">
        <div class="admin-badge"><i class="fas fa-shield-alt"></i> Admin Sign In</div>
        <h2>Welcome Back</h2>
        <p class="sub">Access your Admin Oversight Panel</p>

        <div class="err-msg" id="errMsg"><i class="fas fa-exclamation-circle"></i> <span id="errText"></span></div>

        <form id="loginForm">
            <div class="fg">
                <input type="text" id="username" placeholder="Admin Username" autocomplete="username" required>
            </div>
            <div class="fg pw-wrap">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                <i class="fa fa-eye" id="eyeToggle" onclick="togglePw()"></i>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <a href="../students/index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Student Portal</a>

        <div class="demo-note">
            <i class="fas fa-info-circle"></i>
            Demo credentials — username: <strong>admin</strong> | password: <strong>admin123</strong>
        </div>
    </div>
</div>

<script>
const API = '../api/auth.php';

function togglePw() {
    const pw  = document.getElementById('password');
    const eye = document.getElementById('eyeToggle');
    const show = pw.type === 'password';
    pw.type   = show ? 'text' : 'password';
    eye.className = show ? 'fa fa-eye-slash' : 'fa fa-eye';
}

function showErr(msg) {
    document.getElementById('errText').textContent = msg;
    document.getElementById('errMsg').classList.add('show');
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    document.getElementById('errMsg').classList.remove('show');

    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const btn  = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    let success = false;

    // Try PHP auth
    try {
        const res  = await fetch(API + '?action=login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.success) {
            sessionStorage.setItem('adminName', data.name);
            success = true;
        } else {
            showErr(data.message || 'Invalid credentials.');
        }
    } catch (_) {
        // PHP not running – demo fallback
        if (user === 'admin' && pass === 'admin123') {
            sessionStorage.setItem('adminName', 'Admin Doms');
            success = true;
        } else {
            showErr('Invalid username or password.');
        }
    }

    if (success) {
        window.location.href = 'Admin.html';
    } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
});
</script>
</body>
</html>
