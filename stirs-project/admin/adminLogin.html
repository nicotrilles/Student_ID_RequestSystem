<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aces Polytechnic College - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="adminLogin.css">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="overlay"></div>
        <div class="left-content">
            <div>
                <img src="../photo/acespicture-modified (1).png" class="logo" alt="Aces Polytechnic Logo">
                <h1>Welcome to Aces Polytechnic College</h1>
                <p>Easily track a request Student ID and track request in real-time.</p> <br>
                <p>Powered by Smash Doms 1sec.</p>
            </div>
            <div class="socials">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-twitter"></i>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="form-box">
            <h2>Sign In</h2>
            <p class="subtitle">Access your Admin account</p>

            <form method="POST" action="Admin.html">
                <div class="input-group">
                    <input type="text" name="request_id" placeholder="Admin Username" required>
                </div>

                <div class="input-group password-box">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <i class="fa fa-eye" id="togglePassword"></i>
                </div>

                <div class="options">
                    <label><input type="checkbox" name="remember"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" name="login" class="login-btn">Login</button>
            </form>


            <!-- //back botton -->
                <a href="../../index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            

            <!-- Prominent Track Request Button -->
            <!-- <a href="request.html" class="track-request-btn">
                <i class="fas fa-search"></i> Track ID Request (No Account Needed)
            </a> -->

            <!-- <div class="divider"><span>Or continue with</span></div>

            <div class="social-login">
                <button><i class="fab fa-google"></i> Google</button>
                <button><i class="fab fa-microsoft"></i> Microsoft</button>
            </div> -->

            <!-- <p class="signup">Don't have an account?
                <a href="register.html">Create Account</a>
            </p> -->
        </div>
    </div>

</div>

<script>
    // Password toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordField = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    
</script>

</body>
</html>
