<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aces Polytechnic College - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE (Same as Login) -->
    <div class="left">
        <div class="overlay"></div>
        <div class="left-content">
            <div>
                <img src="photo/acespicture-modified (1).png" class="logo" alt="Aces Polytechnic Logo">
                <h1>Join Aces Polytechnic College</h1>
                <p>Create your account to request and track your Student ID easily.</p>
                <p>Smash Doms 1sec</p>
            </div>
            <div class="socials">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-twitter"></i>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE - Registration Form -->
    <div class="right">
        <div class="form-box">
            <h2>Create Account</h2>
            <p class="subtitle">Sign up as a student</p>

            <form id="registerForm">

                <div class="input-group">
                    <label>Student ID Number <span class="required">*</span></label>
                    <input type="text" id="studentId" placeholder="Student ID Number" required>
                </div>

                <div class="input-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="fullName" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <label>Contact Number <span class="required">*</span></label>
                    <input type="tel" id="contact" placeholder="Contact Number" required>
                </div>

                <div class="input-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="text" id="password" placeholder="Create Password" required>
                </div>

                <div class="input-group password-box">
                    <!-- <label>Confirm Password <span class="required">*</span></label> -->
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <i class="fa fa-eye" id="togglePassword"></i>
                </div>

                <button type="submit" class="register-btn">Create Account</button>
            </form>

            <p class="login-link">
                Already have an account?
                <a href="loginform.html">Sign In</a>
            </p>
        </div>
    </div>

</div>

<script>


    // Password toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordField = document.getElementById('confirmPassword');

    togglePassword.addEventListener('click', function () {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // Basic form validation
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }

        alert("Account created successfully! (This is a demo)");
        // In real system: redirect to login or dashboard
        window.location.href = "dashboard.html";
    });
</script>

</body>
</html>
